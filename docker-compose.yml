version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: finalproject_db
    environment:
      POSTGRES_USER: user_admin
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: final_project
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
